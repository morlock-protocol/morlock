name: Publish @morlock/core

# Manually triggered. Bump the version in package.json first, merge to main,
# then run this workflow. Uses npm provenance + OIDC — no long-lived token.
# Requires repo settings → Actions → General → "Allow GitHub Actions to create
# and approve pull requests" is NOT required; the npm publish step uses the
# implicit OIDC token Actions provides.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run only (no publish)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write   # required for npm provenance (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish   # optional GitHub environment for review gating
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish (dry-run)
        if: ${{ inputs.dry_run }}
        run: npm publish --dry-run --access public --provenance

      - name: Publish
        if: ${{ !inputs.dry_run }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
